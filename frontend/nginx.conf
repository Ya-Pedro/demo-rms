limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;                                                                                                                    
                                                                                                                                                                                          
# 1. Блок для HTTP (Редирект на HTTPS)                                                                                                                                                
server {                                                                                                                                                                              
    listen 8080; # Слушаем 8080 внутри контейнера                                                                                                                                     
    server_name rms.ittori.ru;                                                                                                                                                        
    return 301 https://$host$request_uri;                                                                                                                                             
}                                                                                                                                                                                     
                                                                                                                                                                                          
# 2. Блок для HTTPS                                                                                                                                                                   
server {                                                                                                                                                                              
    listen 8443 ssl; # Слушаем 8443 внутри контейнера                                                                                                                                 
    server_name rms.ittori.ru;                                                                                                                                                        
                                                                                                                                                                                          
    # Сертификаты монтируются из папки Let's Encrypt на сервере                                                                                                                       
    ssl_certificate /etc/letsencrypt/live/rms.ittori.ru/fullchain.pem;                                                                                                                
    ssl_certificate_key /etc/letsencrypt/live/rms.ittori.ru/privkey.pem;                                                                                                              
                                                                                                                                                                                          
    ssl_protocols TLSv1.2 TLSv1.3;                                                                                                                                                    
    ssl_ciphers HIGH:!aNULL:!MD5;                                                                                                                                                     
    client_max_body_size 20M;                                                                                                                                                         
                                                                                                                                                                                          
    add_header X-Frame-Options "SAMEORIGIN";                                                                                                                                          
    add_header X-XSS-Protection "1; mode=block";                                                                                                                                      
    add_header X-Content-Type-Options "nosniff";                                                                                                                                      
                                                                                                                                                                                          
    # Эндпоинты для мониторинга                                                                                                                                                       
    location /status {                                                                                                                                                                
        vhost_traffic_status_display;                                                                                                                                                 
        vhost_traffic_status_display_format prometheus;                                                                                                                               
    }                                                                                                                                                                                 
                                                                                                                                                                                          
    location / {                                                                                                                                                                      
        root   /usr/share/nginx/html;                                                                                                                                                 
        index  index.html index.htm;                                                                                                                                                  
        try_files $uri $uri/ /index.html;                                                                                                                                             
    }                                                                                                                                                                                 
                                                                                                                                                                                      
    location /api/ {                                                                                                                                                                  
        proxy_pass http://backend:8000;                                                                                                                                               
        proxy_set_header Host $host;                                                                                                                                                  
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                                      
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;                                                                                                                  
        proxy_set_header X-Forwarded-Proto $scheme;                                                                                                                                   
    }                                                                                                                                                                                 
                                                                                                                                                                                          
     location /api/auth/login {                                                                                                                                                        
        limit_req zone=login_limit burst=5 nodelay;                                                                                                                                   
        proxy_pass http://backend:8000;                                                                                                                                               
        proxy_set_header Host $host;                                                                                                                                                  
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                                      
        proxy_set_header X-Forwarded-Proto $scheme;                                                                                                                                   
    }                                                                                                                                                                                 
}
