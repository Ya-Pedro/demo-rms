limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

server {
    listen 8080;
    server_name _;

    location /status/format/json {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format json;
        allow 172.100.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    location /status/format/html {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format html;
        allow 172.100.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        return 444;
    }
}

server {
    listen 80;
    server_name rms.ittori.ru grafana.rms.ittori.ru localhost grafana.localhost;

    location /status/format/prometheus {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format prometheus;
        allow 172.100.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rms.ittori.ru localhost;

    ssl_certificate /etc/letsencrypt/live/rms.ittori.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rms.ittori.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src blob:; object-src 'none';" always;

    location ~ ^/api/(docs|redoc|openapi\.json) {
        return 403;
    }

    location /status {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format prometheus;
        allow 172.100.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    location /status/format/html {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format html;
        allow 172.100.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    300;
        proxy_connect_timeout 60;
        proxy_send_timeout    300;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}

server {
    listen 443 ssl;
    server_name grafana.rms.ittori.ru grafana.localhost;

    ssl_certificate /etc/letsencrypt/live/grafana.rms.ittori.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.rms.ittori.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data:;" always;

    location ~ ^/(login|api/login) {
        limit_req zone=login_limit burst=10 nodelay;
        
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}